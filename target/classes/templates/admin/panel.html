<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Libros Online</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div class="nav-wrap">
        <strong>Panel administrador</strong>
        <nav>
            <a th:href="@{/}">Inicio</a>
            <a th:href="@{/libros}">Libros</a>
            <a th:href="@{/pedidos}">Pedidos</a>
            <a th:href="@{/logout}">Salir</a>
        </nav>
    </div>
</header>
<div class="container">
    <div th:if="${mensajeExito}" class="alert-ok" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert-error" th:text="${mensajeError}"></div>

    <div class="grid grid-3">
        <div class="card"><h2>Total libros</h2><p class="price" th:text="${totalLibros}"></p></div>
        <div class="card"><h2>Total usuarios</h2><p class="price" th:text="${totalUsuarios}"></p></div>
        <div class="card"><h2>Total pedidos</h2><p class="price" th:text="${totalPedidos}"></p></div>
    </div>

    <div class="card">
        <h2>Gestión de libros</h2>
        <a class="btn" th:href="@{/admin/libros/nuevo}">Nuevo libro</a>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Activo</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="libro : ${libros}">
                <td th:text="${libro.id}"></td>
                <td th:text="${libro.titulo}"></td>
                <td th:text="${libro.autor}"></td>
                <td th:text="${'$ ' + #numbers.formatDecimal(libro.precio, 0, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${libro.stock}"></td>
                <td th:text="${libro.activo ? 'Sí' : 'No'}"></td>
                <td class="actions">
                    <a class="btn btn-secondary" th:href="@{'/admin/libros/editar/' + ${libro.id}}">Editar</a>
                    <form th:action="@{'/admin/libros/eliminar/' + ${libro.id}}" method="post">
                        <button class="btn-danger" type="submit">Desactivar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2>Pedidos registrados</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Total</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pedido : ${pedidos}">
                <td th:text="${pedido.id}"></td>
                <td th:text="${pedido.usuario.nombre}"></td>
                <td th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${pedido.estado}"></td>
                <td th:text="${'$ ' + #numbers.formatDecimal(pedido.total, 0, 'COMMA', 0, 'POINT')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(pedidos)}"><td colspan="5">No hay pedidos aún.</td></tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
