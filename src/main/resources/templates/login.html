<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Libros Online</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div class="nav-wrap"><strong>Libros Online</strong><nav><a th:href="@{/}">Inicio</a></nav></div>
</header>
<div class="container">
    <div class="card" style="max-width:520px;margin:0 auto;">
        <h1>Iniciar sesión</h1>
        <div th:if="${mensajeExito}" class="alert-ok" th:text="${mensajeExito}"></div>
        <div th:if="${mensajeError}" class="alert-error" th:text="${mensajeError}"></div>

        <form th:action="@{/login}" th:object="${loginForm}" method="post">
            <label>Usuario</label>
            <input type="text" th:field="*{usuario}" required>

            <label>Clave</label>
            <input type="password" th:field="*{clave}" required>

            <button type="submit">Ingresar</button>
        </form>

        <p class="small">Administrador inicial: <strong>admin</strong> / <strong>admin123</strong></p>
        <p>¿No tienes cuenta? <a th:href="@{/registro}">Regístrate</a></p>
    </div>
</div>
</body>
</html>
