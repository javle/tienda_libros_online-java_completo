<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Libros Online</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div class="nav-wrap">
        <strong>Libros Online</strong>
        <nav>
            <a th:href="@{/}">Inicio</a>
            <a th:href="@{/login}">Login</a>
        </nav>
    </div>
</header>

<div class="container">
    <div class="card" style="max-width:580px;margin:0 auto;">
        <h1>Registro de usuario</h1>

        <div th:if="${mensajeError}" class="alert-error" th:text="${mensajeError}"></div>
        <div th:if="${mensajeExito}" class="alert-success" th:text="${mensajeExito}"></div>

        <form th:action="@{/registro}" th:object="${registroForm}" method="post">
            <label>Nombre completo</label>
            <input type="text" th:field="*{nombre}" required>

            <label>Usuario</label>
            <input type="text" th:field="*{usuario}" required>

            <label>Correo</label>
            <input type="email" th:field="*{correo}" required>

            <label>Clave</label>
            <input type="password" th:field="*{clave}" required>

            <button type="submit">Crear cuenta</button>
        </form>
    </div>
</div>

</body>
</html>
