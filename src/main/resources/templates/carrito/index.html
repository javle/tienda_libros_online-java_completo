<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | Libros Online</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div class="nav-wrap">
        <strong>Libros Online</strong>
        <nav>
            <a th:href="@{/}">Inicio</a>
            <a th:href="@{/libros}">Libros</a>
            <a th:href="@{/carrito}">Carrito</a>
            <a th:href="@{/pedidos}">Pedidos</a>
        </nav>
    </div>
</header>
<div class="container">
    <div th:if="${mensajeExito}" class="alert-ok" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert-error" th:text="${mensajeError}"></div>

    <div class="card">
        <h1>Carrito de compras</h1>
        <table>
            <thead>
            <tr>
                <th>Libro</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.titulo}"></td>
                <td th:text="${'$ ' + #numbers.formatDecimal(item.precio, 0, 'COMMA', 0, 'POINT')}"></td>
                <td>
                    <form th:action="@{'/carrito/actualizar/' + ${item.libroId}}" method="post" class="inline-form">
                        <input type="number" name="cantidad" min="0" th:value="${item.cantidad}">
                        <button type="submit">Actualizar</button>
                    </form>
                </td>
                <td th:text="${'$ ' + #numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')}"></td>
                <td>
                    <form th:action="@{'/carrito/eliminar/' + ${item.libroId}}" method="post">
                        <button class="btn-danger" type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="5">Tu carrito está vacío.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2>Total del carrito</h2>
        <p class="price" th:text="${'$ ' + #numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}"></p>
        <form th:action="@{/carrito/checkout}" method="post">
            <button type="submit" th:disabled="${#lists.isEmpty(items)}">Generar pedido</button>
        </form>
    </div>
</div>
</body>
</html>
