<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro | Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div class="nav-wrap"><strong>Administrador</strong><nav><a th:href="@{/admin}">Volver al panel</a></nav></div>
</header>
<div class="container">
    <div class="card" style="max-width:760px;margin:0 auto;">
        <h1 th:text="${libro.id == null} ? 'Nuevo libro' : 'Editar libro'"></h1>
        <form th:action="@{/admin/libros/guardar}" th:object="${libro}" method="post">
            <input type="hidden" th:field="*{id}">

            <label>Título</label>
            <input type="text" th:field="*{titulo}" required>

            <label>Autor</label>
            <input type="text" th:field="*{autor}" required>

            <label>Categoría</label>
            <input type="text" th:field="*{categoria}">

            <label>ISBN</label>
            <input type="text" th:field="*{isbn}">

            <label>Descripción</label>
            <textarea th:field="*{descripcion}" rows="5"></textarea>

            <label>Precio</label>
            <input type="number" step="0.01" min="0" th:field="*{precio}" required>

            <label>Stock</label>
            <input type="number" min="0" th:field="*{stock}" required>

            <div style="display:flex;gap:10px;">
                <button type="submit">Guardar</button>
                <a class="btn btn-secondary" th:href="@{/admin}">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
