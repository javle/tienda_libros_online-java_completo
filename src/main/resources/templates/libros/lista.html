<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Libros Online</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div class="nav-wrap">
        <strong>Libros Online</strong>
        <nav>
            <a th:href="@{/}">Inicio</a>
            <a th:href="@{/libros}">Libros</a>
            <a th:href="@{/carrito}">Carrito (<span th:text="${cartCount}">0</span>)</a>
            <a th:href="@{/pedidos}">Pedidos</a>
            <a th:if="${esAdmin}" th:href="@{/admin}">Admin</a>
        </nav>
    </div>
</header>
<div class="container">
    <div th:if="${mensajeExito}" class="alert-ok" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert-error" th:text="${mensajeError}"></div>

    <div class="card">
        <h1>Catálogo de libros</h1>
        <form method="get" th:action="@{/libros}" class="inline-form">
            <input type="text" name="q" placeholder="Buscar por título o autor" th:value="${q}">
            <button type="submit">Buscar</button>
            <a class="btn btn-secondary" th:href="@{/libros}">Limpiar</a>
        </form>
    </div>

    <div class="grid grid-2">
        <div class="card" th:each="libro : ${libros}">
            <h2 th:text="${libro.titulo}"></h2>
            <p class="muted"><strong>Autor:</strong> <span th:text="${libro.autor}"></span></p>
            <p class="muted"><strong>Categoría:</strong> <span th:text="${libro.categoria}"></span></p>
            <p th:text="${libro.descripcion}"></p>
            <p class="price" th:text="${'$ ' + #numbers.formatDecimal(libro.precio, 0, 'COMMA', 0, 'POINT')}"></p>
            <p><strong>Stock:</strong> <span th:text="${libro.stock}"></span></p>
            <form th:action="@{'/carrito/agregar/' + ${libro.id}}" method="post" class="inline-form">
                <input type="number" name="cantidad" value="1" min="1">
                <button type="submit">Agregar al carrito</button>
            </form>
        </div>
        <div class="card" th:if="${#lists.isEmpty(libros)}">
            <p>No se encontraron libros con el criterio de búsqueda.</p>
        </div>
    </div>
</div>
</body>
</html>
